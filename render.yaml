services:
  - type: web
    name: taskmanager-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://taskmanager-frontend.onrender.com
      - key: SQLITE_PATH
        value: /var/data/test.db
    disk:
      name: taskmanager-backend-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: taskmanager-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: BACKEND_URL
        fromService:
          type: web
          name: taskmanager-backend
          property: url
